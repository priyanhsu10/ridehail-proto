syntax = "proto3";

package ridehail.driver.v1;

option java_package = "com.ridehail.driver.grpc";
option java_multiple_files = true;

service DriverService {
  rpc GetDriver(GetDriverRequest) returns (Driver);
  rpc UpdateAvailability(UpdateAvailabilityRequest) returns (UpdateAvailabilityResponse);
}

message GetDriverRequest {
  string driver_id = 1;
}

message Driver {
  string driver_id = 1;
  string name = 2;
  string vehicle_plate = 3;
  double rating = 4;
  DriverStatus status = 5;
}

enum DriverStatus {
  DRIVER_STATUS_UNSPECIFIED = 0;
  AVAILABLE = 1;
  ON_TRIP = 2;
  OFFLINE = 3;
}

message UpdateAvailabilityRequest {
  string driver_id = 1;
  DriverStatus status = 2;
}

message UpdateAvailabilityResponse {
  bool success = 1;
}
