syntax = "proto3";

package ridehail.rider.v1;

option java_package = "com.ridehail.rider.grpc";
option java_multiple_files = true;

service RiderService {
  rpc GetRider(GetRiderRequest) returns (Rider);
  rpc ValidateRider(ValidateRiderRequest) returns (ValidateRiderResponse);
}

message GetRiderRequest {
  string rider_id = 1;
}

message Rider {
  string rider_id = 1;
  string name = 2;
  string phone_number = 3;
  double rating = 4;
  bool active = 5;
}

message ValidateRiderRequest {
  string rider_id = 1;
}

message ValidateRiderResponse {
  bool valid = 1;
  string reason = 2; // populated when valid = false, e.g. "SUSPENDED", "NOT_FOUND"
}
