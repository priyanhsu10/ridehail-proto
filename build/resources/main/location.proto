syntax = "proto3";

package ridehail.location.v1;

option java_package = "com.ridehail.location.grpc";
option java_multiple_files = true;

service LocationService {
  // Sync query used by Matching Service - backed by Redis GEOSEARCH.
  rpc FindNearbyDrivers(FindNearbyDriversRequest) returns (FindNearbyDriversResponse);
  rpc GetDriverLocation(GetDriverLocationRequest) returns (DriverLocation);
}

message FindNearbyDriversRequest {
  double pickup_lat = 1;
  double pickup_lng = 2;
  double radius_km = 3;
  int32 max_results = 4;
  repeated string exclude_driver_ids = 5; // drivers who already rejected this trip
}

message FindNearbyDriversResponse {
  repeated NearbyDriver drivers = 1;
}

message NearbyDriver {
  string driver_id = 1;
  double distance_km = 2;
  double lat = 3;
  double lng = 4;
}

message GetDriverLocationRequest {
  string driver_id = 1;
}

message DriverLocation {
  string driver_id = 1;
  double lat = 2;
  double lng = 3;
  int64 updated_at_epoch_ms = 4;
}
