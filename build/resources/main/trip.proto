syntax = "proto3";

package ridehail.trip.v1;

option java_package = "com.ridehail.trip.grpc";
option java_multiple_files = true;

service TripService {
  // Trip creation/lifecycle transitions happen via REST from the API gateway and
  // via Kafka events (see events/topics.md). This RPC exists for other services
  // (e.g. Notification) that need a synchronous point-in-time read of trip state.
  rpc GetTrip(GetTripRequest) returns (Trip);
}

message GetTripRequest {
  int64 trip_id = 1;
}

message Trip {
  int64  trip_id = 1;
  int64 rider_id = 2;
  int64 driver_id = 3; // empty until matched
  TripStatus status = 4;
  double pickup_lat = 5;
  double pickup_lng = 6;
  double dropoff_lat = 7;
  double dropoff_lng = 8;
  int64 requested_at_epoch_ms = 9;
}

enum TripStatus {
  TRIP_STATUS_UNSPECIFIED = 0;
  REQUESTED = 1;
  MATCHED = 2;
  DRIVER_ACCEPTED = 3;
  IN_PROGRESS = 4;
  COMPLETED = 5;
  CANCELLED = 6;
  NO_DRIVER_FOUND = 7; // saga exhausted candidates - terminal failure state
}
